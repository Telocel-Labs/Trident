apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trident.fullname" . }}-indexer
  labels:
    {{- include "trident.labels" . | nindent 4 }}
    app.kubernetes.io/component: indexer
spec:
  # Distributed cursor management is not yet supported — keep at 1 replica.
  replicas: {{ .Values.indexer.replicaCount }}
  selector:
    matchLabels:
      {{- include "trident.selectorLabels" (dict "root" . "component" "indexer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "trident.selectorLabels" (dict "root" . "component" "indexer") | nindent 8 }}
    spec:
      {{- include "trident.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: indexer
          image: "{{ .Values.indexer.image.repository }}:{{ .Values.indexer.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: REDIS_URL
            {{- range $k, $v := .Values.indexer.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.indexer.resources | nindent 12 }}
      {{- with .Values.indexer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.indexer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.indexer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
